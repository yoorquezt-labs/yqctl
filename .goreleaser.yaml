version: 2
project_name: yqctl

builds:
  - id: yqctl
    main: .
    binary: yqctl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: yqctl
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - name: yqctl
    repository:
      owner: yoorquezt-labs
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/yoorquezt-labs/yqctl"
    description: "CLI for the YoorQuezt MEV gateway — submit bundles, protect transactions, stream events"
    license: "MIT"
    install: |
      bin.install "yqctl"
    test: |
      system "#{bin}/yqctl", "--help"

release:
  github:
    owner: yoorquezt-labs
    name: yqctl
  prerelease: auto
  name_template: "v{{.Version}}"
